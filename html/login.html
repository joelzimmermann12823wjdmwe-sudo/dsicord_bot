<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Login...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04080f;--bg2:#060c18;--nav:#030710;--blue:#0052ff;--cyan:#00b4ff;--glow:#00d0ff;--t1:#d0e8ff;--t2:#5580a0;--t3:#1e3350;--b1:rgba(0,120,230,.12);--b2:rgba(0,180,255,.30);--card:rgba(4,14,36,.92);--red:#ff1a3a;--red2:#ff4d6a;}
html,body{height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--t1);cursor:none;-webkit-font-smoothing:antialiased;}
#dot{position:fixed;z-index:9999;pointer-events:none;width:8px;height:8px;border-radius:50%;background:var(--glow);box-shadow:0 0 10px var(--glow),0 0 28px rgba(0,208,255,.35);transform:translate(-50%,-50%);transition:width .13s,height .13s,background .13s,box-shadow .13s}
#ring{position:fixed;z-index:9998;pointer-events:none;width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,180,255,.28);transform:translate(-50%,-50%)}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,100,220,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,220,.022) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 30s linear infinite}
@keyframes gridShift{to{background-position:60px 60px}}
.orb{position:absolute;border-radius:50%;filter:blur(130px);pointer-events:none}
.orb1{width:1000px;height:700px;top:-250px;left:50%;background:radial-gradient(ellipse,rgba(0,60,200,.07),transparent 68%);transform:translateX(-50%);animation:o1 15s ease-in-out infinite}
.orb2{width:700px;height:700px;bottom:-120px;right:-150px;background:radial-gradient(ellipse,rgba(0,70,180,.055),transparent 68%);animation:o2 18s ease-in-out infinite}
.orb3{width:500px;height:500px;top:30%;left:-120px;background:radial-gradient(ellipse,rgba(0,140,255,.04),transparent 68%);animation:o2 12s ease-in-out infinite reverse}
@keyframes o1{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-35px)}}
@keyframes o2{0%,100%{transform:translateY(0)}50%{transform:translateY(-45px)}}
.hscan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,.07),transparent);animation:hscanMove 12s linear infinite}
@keyframes hscanMove{0%{top:0%}100%{top:100%}}
.stars{position:absolute;inset:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--o)}}
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:linear-gradient(180deg,rgba(3,7,16,.95),transparent);backdrop-filter:blur(0px);}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:1.25rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#fff 0%,var(--cyan) 55%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-logo .bolt{font-size:1.4rem;-webkit-text-fill-color:var(--cyan);color:var(--cyan);filter:drop-shadow(0 0 8px var(--cyan));animation:boltFlash 3s ease-in-out infinite}
@keyframes boltFlash{0%,100%{filter:drop-shadow(0 0 8px var(--cyan))}50%{filter:drop-shadow(0 0 22px var(--cyan))}}
.nav-right{display:flex;align-items:center;gap:12px}
a{text-decoration:none}
</style>
<style>
.center{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.loader{width:40px;height:40px;border:3px solid rgba(0,180,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head><body>
<div id="bg"><div class="grid"></div><div class="orb orb1"></div><div class="hscan"></div></div>
<div class="center"><div class="loader"></div><h2>Weiterleitung zu Discord...</h2><p style="color:var(--t2);margin-top:10px;">Bitte warten.</p></div>
<script>
// Simuliert den OAuth Login und leitet nach 1.5s weiter
setTimeout(() => { window.location.href = '/serverauswahl'; }, 1500);
</script>
</body></html>
