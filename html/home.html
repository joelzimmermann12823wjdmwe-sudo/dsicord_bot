<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Neon Bot</title><style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04080f;--bg2:#060c18;--nav:#030710;--blue:#0052ff;--cyan:#00b4ff;--glow:#00d0ff;--t1:#d0e8ff;--t2:#5580a0;--t3:#1e3350;--b1:rgba(0,120,230,.12);--b2:rgba(0,180,255,.30);--card:rgba(4,14,36,.92);--red:#ff1a3a;--red2:#ff4d6a}
html,body{height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--t1);cursor:none}
#dot{position:fixed;z-index:9999;pointer-events:none;width:8px;height:8px;border-radius:50%;background:var(--glow);box-shadow:0 0 10px var(--glow);transform:translate(-50%,-50%);transition:width .13s,height .13s}
#ring{position:fixed;z-index:9998;pointer-events:none;width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,180,255,.28);transform:translate(-50%,-50%)}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,100,220,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,220,.02) 1px,transparent 1px);background-size:60px 60px}
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(3,7,16,.9);backdrop-filter:blur(10px)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:800;color:#fff}.bolt{color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
.btn-login{display:inline-flex;align-items:center;gap:10px;padding:10px 22px;background:#5865f2;color:#fff;border-radius:8px;font-weight:700;text-decoration:none;transition:0.2s;border:none;cursor:pointer}
.btn-login:hover{background:#4752c4;transform:translateY(-2px)}
.btn-login svg{width:18px;height:18px;fill:currentColor}
.view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero-title{font-size:clamp(3rem,8vw,6rem);font-weight:800;line-height:0.9;margin-bottom:20px}
.t-glow{background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.unavail-center{z-index:20;text-align:center}.unavail-title{font-size:3rem;font-weight:800;margin-bottom:10px}.unavail-sub{color:var(--t2);margin-bottom:30px}
.unavail-back{padding:10px 20px;border:1px solid var(--red);color:var(--red);border-radius:8px;text-decoration:none;transition:0.2s}
.unavail-back:hover{background:rgba(255,26,58,0.1)}</style></head><body>
<div id="bg"><div class="grid"></div><div class="hscan"></div></div><div id="dot"></div><div id="ring"></div>
<div class="navbar"><div class="nav-logo"><span class="bolt">⚡</span> Neon Bot</div><div class="nav-right"><a href="/login" class="btn-login"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.042.031.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.04.001-.088-.041-.104a13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg> Login</a></div></div>
<div class="view active"><h1 class="hero-title"><span class="t-white">Dein Server.</span><br><span class="t-glow">Deine Kontrolle.</span></h1><p style="color:var(--t2);margin-bottom:40px">Verwalte deinen Bot einfach über das Browser-Dashboard.</p><a href="/login" class="btn-login" style="padding:15px 30px"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.042.031.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.04.001-.088-.041-.104a13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg> Mit Discord anmelden</a></div>
<script>const dot=document.getElementById('dot');const ring=document.getElementById('ring');let mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});(function loop(){dot.style.left=mx+'px';dot.style.top=my+'px';rx+=(mx-rx)*.15;ry+=(my-ry)*.15;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();</script></body></html>
