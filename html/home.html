<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bot | Dashboard</title>
    <style>
        :root {
            --neon-red: #ff1a3a;
            --dark-bg: #04080f;
            --panel-bg: #0a101a;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Hintergrund-Effekt */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0505 0%, transparent 70%);
            z-index: -1;
        }

        .login-card {
            background: var(--panel-bg);
            padding: 3rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 26, 58, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 26, 58, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--neon-red);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
        }

        .btn-login {
            display: inline-block;
            background: transparent;
            color: var(--neon-red);
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid var(--neon-red);
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px var(--neon-red);
        }

        .btn-login:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #333;
        }

        /* Kleine Animation für den Neon-Effekt */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        .logo { animation: pulse 2s infinite; }

    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Neon</div>
        <div class="subtitle">SYSTEM INTERFACE v1.0</div>
        
        <p style="margin-bottom: 2rem; color: #ccc;">Willkommen im Administrations-Panel. Bitte autorisiere dich über Discord, um fortzufahren.</p>
        
        <a href="{{ url_for('login') }}" class="btn-login">Login mit Discord</a>

        <div class="footer-note">
            SECURE ENCRYPTED CONNECTION REQUIRED
        </div>
    </div>

</body>
</html>
