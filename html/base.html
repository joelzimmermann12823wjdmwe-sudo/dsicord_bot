<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Neon Bot{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    {% block head %}{% endblock %}
</head>
<body data-page="{% block page_id %}dashboard{% endblock %}">
    <div class="dashboard-bg" aria-hidden="true">
        <div class="bg-orb bg-orb-a"></div>
        <div class="bg-orb bg-orb-b"></div>
        <div class="bg-grid"></div>
    </div>

    <div class="shell">
        <header class="topbar panel topbar-panel reveal">
            <div class="brand-cluster">
                <a class="brand" href="{{ url_for('home') }}">
                    <span class="brand-badge"></span>
                    <span class="brand-wordmark">Neon Bot</span>
                </a>
                <div class="brand-copy">
                    <span class="eyebrow">Control Surface</span>
                    <p>Discord moderation, guild settings and live dashboard control in one place.</p>
                </div>
            </div>

            <div class="topbar-right">
                <div class="topbar-utility">
                    <span class="status-chip">
                        <span class="status-dot"></span>
                        Lokales Dashboard
                    </span>
                    <span class="clock-chip" data-live-clock>--:--:--</span>
                </div>
                <div class="action-row">
                    {% block topbar_actions %}{% endblock %}
                </div>
            </div>
        </header>

        <main class="page-stack">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="toast-stack" data-toast-stack aria-live="polite" aria-atomic="true"></div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
