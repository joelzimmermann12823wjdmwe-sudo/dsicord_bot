<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f12;
            --card-bg: #1a1a1f;
            --accent: #5865F2;
            --text: #ffffff;
            --text-dim: #b9bbbe;
            --danger: #ed4245;
            --success: #3ba55c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--card-bg);
            padding: 20px;
            border-right: 1px solid #2f2f35;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        /* Server Grid */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .server-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2f2f35;
            transition: transform 0.2s;
        }

        .server-card:hover { transform: translateY(-5px); }

        .server-icon { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; border: 3px solid #2f2f35; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .badge-on { background: rgba(59, 165, 92, 0.2); color: var(--success); }
        .badge-off { background: rgba(237, 66, 69, 0.2); color: var(--danger); }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-manage { background: var(--accent); color: white; }
        .btn-invite { background: var(--danger); color: white; }

        /* Module View */
        #module-view { display: none; }
        .module-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4f545c;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-bolt"></i> NeonBot</div>
        <div id="user-info">Lade Profil...</div>
    </div>

    <div class="main-content">
        <div id="dashboard-home">
            <h1>Deine Server</h1>
            <div class="server-grid" id="server-list">
                </div>
        </div>

        <div id="module-view">
            <button onclick="showHome()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:20px;">
                <i class="fas fa-arrow-left"></i> Zurück zur Übersicht
            </button>
            <h1 id="selected-server-name">Server Name</h1>
            
            <div class="module-card">
                <div>
                    <h3><i class="fas fa-shield-halved"></i> Auto-Moderation</h3>
                    <p style="color:var(--text-dim)">Löscht Schimpfwörter und Caps-Spam automatisch.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="check-automod" onchange="updateModule('automod')">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="module-card">
                <div>
                    <h3><i class="fas fa-door-open"></i> Willkommens-System</h3>
                    <p style="color:var(--text-dim)">Begrüßt neue Mitglieder automatisch.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="check-welcome" onchange="updateModule('welcome')">
                    <span class="slider"></span>
                </label>
            </div>
            
            <p id="save-status" style="text-align:right; color:var(--success); font-size:14px; display:none;">
                <i class="fas fa-check"></i> In Supabase gespeichert!
            </p>
        </div>
    </div>

    <script>
        let selectedGuildId = null;

        // 1. Initialisierung
        window.onload = async () => {
            const meRes = await fetch('/api/me');
            if(meRes.ok) {
                const user = await meRes.json();
                document.getElementById('user-info').innerText = `Eingeloggt als ${user.username}`;
            }
            loadGuilds();
        };

        // 2. Server laden
        async function loadGuilds() {
            const res = await fetch('/api/guilds');
            const guilds = await res.json();
            const list = document.getElementById('server-list');
            list.innerHTML = '';

            guilds.forEach(g => {
                const icon = g.icon ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png` : 'https://vectorified.com/images/discord-bot-icon-23.png';
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <img src="${icon}" class="server-icon">
                    <h3>${g.name}</h3>
                    <span class="badge ${g.bot_present ? 'badge-on' : 'badge-off'}">
                        ${g.bot_present ? 'Online' : 'Bot fehlt'}
                    </span>
                    ${g.bot_present ? 
                        `<button class="btn btn-manage" onclick="manageServer('${g.id}', '${g.name.replace(/'/g, "\\'")}')">Verwalten</button>` : 
                        `<button class="btn btn-invite" onclick="inviteBot()">Einladen</button>`
                    }
                `;
                list.appendChild(card);
            });
        }

        // 3. Modul View öffnen
        async function manageServer(id, name) {
            selectedGuildId = id;
            document.getElementById('dashboard-home').style.display = 'none';
            document.getElementById('module-view').style.display = 'block';
            document.getElementById('selected-server-name').innerText = name;

            // Bestehende Config aus Supabase laden
            const res = await fetch(`/api/guild/${id}/config`);
            const config = await res.json();
            
            // Checkboxen setzen
            document.getElementById('check-automod').checked = config.automod || false;
            document.getElementById('check-welcome').checked = config.welcome || false;
        }

        // 4. In Supabase speichern
        async function updateModule(moduleName) {
            const isEnabled = document.getElementById(`check-${moduleName}`).checked;
            
            const res = await fetch(`/api/guild/${selectedGuildId}/config`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    module: moduleName,
                    config: isEnabled
                })
            });

            if(res.ok) {
                const status = document.getElementById('save-status');
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 2000);
            }
        }

        function showHome() {
            document.getElementById('dashboard-home').style.display = 'block';
            document.getElementById('module-view').style.display = 'none';
        }

        function inviteBot() {
            const clientId = "1470766309192241224"; // WICHTIG: Setze hier deine Bot ID ein!
            window.open(`https://discord.com/oauth2/authorize?client_id=${clientId}&permissions=8&scope=bot%20applications.commands`, '_blank');
        }
    </script>
</body>
</html>
